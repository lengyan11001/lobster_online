name: bluewhite-tech
display_name: "蓝白科技商务风"

description: |
  现代科技园区风格，商务大气，国际科技平台公司路演材料风格。
  蓝白色调为主，冷色调，科技感强。

# AI 图片生成风格关键词（注入到每个 prompt 前面）
style_keywords: |
  【统一风格要求】
  视觉风格：现代科技园区风格，商务大气，国际科技平台公司路演材料风格。
  色彩要求：蓝白色调为主，品牌蓝+冰蓝+白色/银灰，冷色调，科技感强，
  局部高亮蓝做强调，不要大面积纯黑或深蓝压底，不要赛博朋克。
  氛围要求：高端商务感，轻科技，平台感，高级感，专业感，可信感，未来感。
  禁止：机器人脸、机械手、发光芯片、大量普通方框堆叠、廉价商务素材、
  培训招生海报风、廉价AI模板风、赛博朋克、暗黑蓝光、满页密集小字。

# 参考图（可选，用于视觉锚定，填写 output 目录下已有的满意成品图路径）
reference_image: "themes/bluewhite-tech-ref.png"

# 生成模型
model: "gpt-image-2"

# 图片尺寸
image_size: "3840x2160"

# 图片质量
image_quality: "high"

# 色彩参考（用于文档说明）
color_scheme:
  primary: "品牌蓝"
  secondary: "冰蓝"
  background: "白色/银灰"
  tone: "冷色调"

# 适用场景
use_cases:
  - "科技园区商业PPT"
  - "科技公司路演材料"
  - "商务平台介绍"
  - "科技品牌发布"
