<div id="content-social-leads" class="content-block">
  <div class="social-leads-page">
    <style>
      .social-leads-page {
        --sl-accent: #ea580c;
        --sl-accent-2: #0f766e;
        --sl-ink: #111827;
        --sl-muted: #667085;
        --sl-border: rgba(17,24,39,0.12);
        min-height: calc(100vh - 72px);
        padding: 1rem;
        background: linear-gradient(135deg, #fff7ed 0%, #f8fafc 48%, #ecfeff 100%);
        color: var(--sl-ink);
      }
      .social-leads-page.is-x {
        --sl-accent: #111827;
        --sl-accent-2: #2563eb;
        background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 46%, #ecfeff 100%);
      }
      .sl-head {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: flex-start;
        margin-bottom: 0.85rem;
      }
      .sl-kicker {
        color: var(--sl-accent);
        font-size: 0.76rem;
        font-weight: 900;
      }
      .sl-title {
        margin: 0.12rem 0 0;
        font-size: 1.35rem;
        line-height: 1.25;
      }
      .sl-subtitle {
        margin-top: 0.28rem;
        color: var(--sl-muted);
        font-size: 0.9rem;
      }
      .sl-actions,
      .sl-row-actions {
        display: flex;
        gap: 0.45rem;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .sl-tabs {
        display: flex;
        gap: 0.35rem;
        padding: 0.3rem;
        border: 1px solid var(--sl-border);
        background: rgba(255,255,255,0.78);
        border-radius: 10px;
        overflow-x: auto;
        margin-bottom: 0.85rem;
      }
      .sl-tab {
        border: 0;
        background: transparent;
        color: #334155;
        padding: 0.52rem 0.76rem;
        border-radius: 8px;
        font-weight: 900;
        white-space: nowrap;
        cursor: pointer;
      }
      .sl-tab.is-active {
        background: var(--sl-accent);
        color: #fff;
      }
      .sl-panel {
        display: none;
      }
      .sl-panel.is-active {
        display: block;
      }
      .sl-grid.is-single {
        grid-template-columns: minmax(320px, 760px);
      }
      .sl-grid {
        display: grid;
        grid-template-columns: minmax(320px, 0.85fr) minmax(460px, 1.15fr);
        gap: 0.85rem;
        align-items: start;
      }
      .sl-run-grid {
        display: grid;
        grid-template-columns: minmax(300px, 0.65fr) minmax(520px, 1.35fr);
        gap: 0.85rem;
        align-items: start;
      }
      .sl-run-main {
        display: grid;
        gap: 0.85rem;
      }
      .sl-card {
        background: rgba(255,255,255,0.92);
        border: 1px solid var(--sl-border);
        border-radius: 12px;
        padding: 0.9rem;
        box-shadow: 0 14px 34px rgba(15, 23, 42, 0.06);
      }
      .sl-card-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
        font-weight: 900;
        margin-bottom: 0.7rem;
      }
      .sl-field {
        display: grid;
        gap: 0.35rem;
        margin-bottom: 0.75rem;
      }
      .sl-field label {
        font-size: 0.78rem;
        font-weight: 900;
        color: #334155;
      }
      .sl-source-toggle {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      .sl-source-toggle label {
        border: 1px solid rgba(15,23,42,0.14);
        border-radius: 10px;
        background: rgba(255,255,255,0.82);
        padding: 0.62rem 0.72rem;
        display: flex;
        gap: 0.45rem;
        align-items: center;
        font-weight: 900;
        color: #334155;
        cursor: pointer;
      }
      .sl-source-toggle label:has(input:checked) {
        color: #fff;
        background: var(--sl-accent);
        border-color: transparent;
      }
      .sl-field input,
      .sl-field textarea,
      .sl-field select {
        width: 100%;
        border: 1px solid rgba(15,23,42,0.16);
        border-radius: 9px;
        background: #fff;
        color: var(--sl-ink);
        padding: 0.58rem 0.68rem;
        font-size: 0.9rem;
        outline: none;
      }
      .sl-field textarea {
        min-height: 94px;
        line-height: 1.55;
        resize: vertical;
      }
      .sl-inline {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.65rem;
      }
      .sl-checkline {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        color: #334155;
        font-size: 0.84rem;
        font-weight: 800;
      }
      .sl-checkline input {
        width: auto;
      }
      .sl-msg {
        display: none;
        margin-bottom: 0.8rem;
        padding: 0.65rem 0.75rem;
        border-radius: 9px;
        border: 1px solid rgba(14,116,144,0.24);
        background: rgba(14,116,144,0.08);
        color: #155e75;
        white-space: pre-line;
      }
      .sl-msg.err {
        border-color: rgba(225,29,72,0.28);
        background: rgba(225,29,72,0.08);
        color: #be123c;
      }
      .sl-list {
        display: grid;
        gap: 0.55rem;
        max-height: 640px;
        overflow: auto;
        padding-right: 0.2rem;
      }
      .sl-template-list {
        display: grid;
        gap: 0.55rem;
        max-height: 520px;
        overflow: auto;
      }
      .sl-template-item {
        border: 1px solid rgba(15,23,42,0.1);
        border-radius: 10px;
        background: #fff;
        padding: 0.72rem;
      }
      .sl-template-item strong {
        display: block;
        line-height: 1.45;
        word-break: break-word;
      }
      .sl-template-actions {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
        margin-top: 0.55rem;
      }
      .sl-item,
      .sl-lead {
        border: 1px solid rgba(15,23,42,0.1);
        border-radius: 10px;
        background: #fff;
        padding: 0.72rem;
        cursor: pointer;
      }
      .sl-item.is-active,
      .sl-lead.is-active {
        border-color: color-mix(in srgb, var(--sl-accent) 52%, transparent);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--sl-accent) 12%, transparent);
      }
      .sl-item strong,
      .sl-lead strong {
        display: block;
        line-height: 1.45;
        word-break: break-word;
      }
      .sl-meta {
        display: block;
        margin-top: 0.25rem;
        color: var(--sl-muted);
        font-size: 0.82rem;
        line-height: 1.45;
        word-break: break-word;
      }
      .sl-badges {
        display: flex;
        gap: 0.35rem;
        flex-wrap: wrap;
        margin-top: 0.45rem;
      }
      .sl-badge {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        border-radius: 999px;
        padding: 0.12rem 0.45rem;
        background: color-mix(in srgb, var(--sl-accent) 10%, white);
        color: var(--sl-accent);
        font-weight: 900;
        font-size: 0.72rem;
      }
      .sl-badge.done { background: rgba(16,185,129,0.12); color: #047857; }
      .sl-badge.fail { background: rgba(244,63,94,0.12); color: #be123c; }
      .sl-badge.run { background: rgba(245,158,11,0.14); color: #92400e; }
      .sl-auto-hint {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 0.18rem 0.62rem;
        background: rgba(16,185,129,0.12);
        color: #047857;
        font-size: 0.76rem;
        font-weight: 900;
      }
      .sl-progress {
        height: 8px;
        border-radius: 999px;
        background: rgba(15,23,42,0.08);
        overflow: hidden;
      }
      .sl-progress span {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, var(--sl-accent), var(--sl-accent-2));
      }
      .sl-step {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr) auto;
        gap: 0.6rem;
        align-items: start;
        padding: 0.65rem 0;
        border-bottom: 1px solid rgba(15,23,42,0.08);
        cursor: pointer;
      }
      .sl-step.is-active {
        background: color-mix(in srgb, var(--sl-accent) 8%, transparent);
        border-radius: 10px;
        padding-left: 0.45rem;
        padding-right: 0.45rem;
      }
      .sl-step:last-child { border-bottom: 0; }
      .sl-step-dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(15,23,42,0.08);
        color: #475569;
        font-size: 0.74rem;
        font-weight: 900;
      }
      .sl-step.is-completed .sl-step-dot { background: #10b981; color: #fff; }
      .sl-step.is-running .sl-step-dot { background: #f59e0b; color: #fff; }
      .sl-step.is-failed .sl-step-dot { background: #ef4444; color: #fff; }
      .sl-detail {
        display: grid;
        gap: 0.7rem;
      }
      .sl-box {
        border: 1px solid rgba(15,23,42,0.1);
        border-radius: 10px;
        background: #f8fafc;
        padding: 0.75rem;
      }
      .sl-box h4 {
        margin: 0 0 0.4rem;
        font-size: 0.9rem;
      }
      .sl-source-card,
      .sl-evidence {
        border: 1px solid rgba(15,23,42,0.1);
        border-radius: 10px;
        background: #fff;
        padding: 0.72rem;
        margin-top: 0.55rem;
      }
      .sl-source-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.55rem;
      }
      .sl-source-desc {
        margin-top: 0.45rem;
        color: #334155;
        font-size: 0.86rem;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .sl-kv-list {
        display: grid;
        gap: 0.45rem;
      }
      .sl-kv {
        display: grid;
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 0.65rem;
        padding: 0.45rem 0;
        border-bottom: 1px solid rgba(15,23,42,0.07);
      }
      .sl-kv:last-child { border-bottom: 0; }
      .sl-kv span {
        color: var(--sl-muted);
        font-size: 0.8rem;
      }
      .sl-kv strong {
        color: #111827;
        font-size: 0.85rem;
        line-height: 1.45;
        word-break: break-word;
      }
      @media (max-width: 980px) {
        .sl-head,
        .sl-actions {
          justify-content: flex-start;
        }
        .sl-grid,
        .sl-run-grid,
        .sl-inline {
          grid-template-columns: 1fr;
        }
      }
    </style>

    <header class="sl-head">
      <div>
        <div id="socialLeadsKicker" class="sl-kicker">Reddit 线索采集</div>
        <h2 id="socialLeadsTitle" class="sl-title">公开信息采集工作台</h2>
        <div id="socialLeadsSubtitle" class="sl-subtitle">只采集公开信息，不执行评论、发布或私信动作</div>
      </div>
      <div class="sl-actions">
        <button type="button" id="socialLeadsSwitchBtn" class="btn btn-ghost btn-sm">切换平台</button>
        <button type="button" id="socialLeadsRefreshBtn" class="btn btn-ghost btn-sm">刷新</button>
        <button type="button" id="socialLeadsBackBtn" class="btn btn-ghost btn-sm">返回</button>
      </div>
    </header>

    <div id="socialLeadsMsg" class="sl-msg"></div>

    <nav class="sl-tabs" aria-label="社媒线索采集">
      <button type="button" class="sl-tab is-active" data-sl-tab="new">新建采集</button>
      <button type="button" class="sl-tab" data-sl-tab="runs">执行过程</button>
      <button type="button" class="sl-tab" data-sl-tab="leads">线索名单</button>
      <button type="button" class="sl-tab" data-sl-tab="outputs">采集明细</button>
    </nav>

    <section class="sl-panel is-active" data-sl-panel="new">
      <div class="sl-grid">
        <div class="sl-card">
          <div class="sl-card-title">采集输入</div>
          <div class="sl-field">
            <label for="slJobTitleInput">任务名称</label>
            <input id="slJobTitleInput" type="text" placeholder="例如：AI工具潜在线索采集">
          </div>
          <div class="sl-field">
            <label for="slKeywordsInput">精准用户方向关键词（必填）</label>
            <textarea id="slKeywordsInput" required placeholder="用户想抓哪类精准用户。每行一个，例如：AI automation&#10;lead generation"></textarea>
          </div>
          <div class="sl-source-toggle">
            <label><input type="radio" name="slSourceMode" value="account" checked> 按账号采集</label>
            <label><input type="radio" name="slSourceMode" value="community"> <span id="slSourceModeCommunityLabel">按社区采集</span></label>
          </div>
          <div class="sl-field" data-sl-source-field="community">
            <label for="slCommunitiesInput" id="slCommunitiesLabel">Reddit 社区</label>
            <textarea id="slCommunitiesInput" placeholder="每行一个，例如：Entrepreneur&#10;SaaS"></textarea>
          </div>
          <div class="sl-field" data-sl-source-field="account">
            <label for="slAccountsInput">账号</label>
            <textarea id="slAccountsInput" placeholder="每行一个。Reddit 可填 u/xxx；TikTok/X 可填 @xxx 或主页链接"></textarea>
          </div>
          <div class="sl-meta">采集规则固定为近 24 小时公开视频/帖子和评论；获取资料后按上面的关键词方向筛选精准用户。</div>
          <div class="sl-row-actions">
            <button type="button" id="slStartJobBtn" class="btn btn-primary">开始采集</button>
            <button type="button" id="slCreateTemplateBtn" class="btn btn-ghost">创建模板</button>
            <button type="button" id="slSaveDraftBtn" class="btn btn-ghost">保存输入</button>
            <button type="button" id="slLoadDraftBtn" class="btn btn-ghost">读取上次输入</button>
          </div>
        </div>
        <div class="sl-card">
          <div class="sl-card-title">
            <span>采集模板</span>
            <button type="button" id="slRefreshTemplatesBtn" class="btn btn-ghost btn-sm">刷新</button>
          </div>
          <div id="slTemplateList" class="sl-template-list"></div>
        </div>
      </div>
    </section>

    <section class="sl-panel" data-sl-panel="runs">
      <div class="sl-run-grid">
        <div class="sl-card">
          <div class="sl-card-title">任务记录</div>
          <div id="slJobList" class="sl-list"></div>
        </div>
        <div class="sl-run-main">
          <div class="sl-card">
            <div class="sl-card-title">
              <span>执行步骤</span>
              <span class="sl-auto-hint">自动执行并刷新</span>
            </div>
            <div class="sl-progress"><span id="slProgressBar"></span></div>
            <div id="slStepList" style="margin-top:0.75rem;"></div>
          </div>
          <div class="sl-card">
            <div class="sl-card-title">步骤采集明细</div>
            <div id="slStepDetail" class="sl-detail"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="sl-panel" data-sl-panel="leads">
      <div class="sl-grid">
        <div class="sl-card">
          <div class="sl-card-title">
            <span>线索名单</span>
            <div class="sl-row-actions">
              <button type="button" id="slExportLeadsBtn" class="btn btn-primary btn-sm">导出 Excel</button>
              <button type="button" id="slCopyLeadsBtn" class="btn btn-ghost btn-sm">复制名单</button>
            </div>
          </div>
          <div id="slLeadList" class="sl-list"></div>
        </div>
        <div class="sl-card">
          <div class="sl-card-title">线索详情</div>
          <div id="slLeadDetail" class="sl-detail"></div>
        </div>
      </div>
    </section>

    <section class="sl-panel" data-sl-panel="outputs">
      <div class="sl-grid">
        <div class="sl-card">
          <div class="sl-card-title">采集列表</div>
          <div id="slOutputList" class="sl-list"></div>
        </div>
        <div class="sl-card">
          <div class="sl-card-title">采集详情</div>
          <div id="slOutputDetail" class="sl-detail">请选择左侧采集项。</div>
        </div>
      </div>
    </section>
  </div>
</div>
