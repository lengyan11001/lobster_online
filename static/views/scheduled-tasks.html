<div id="content-scheduled-tasks" class="content-block scheduled-tasks-page">
  <div class="card scheduled-hero-card">
    <div class="scheduled-hero-head">
      <div>
        <h3 class="scheduled-page-title">定时任务</h3>
        <p class="scheduled-page-subtitle">给本机盒子下发一次性或间隔执行任务，结果同步到执行记录。</p>
      </div>
      <button id="scheduledTaskRefreshBtn" type="button" class="btn btn-ghost btn-sm scheduled-refresh-btn">刷新</button>
    </div>

    <div class="store-tabs scheduled-tabs">
      <button id="schedTabCreateBtn" type="button" class="sched-tab active" data-sched-tab="create">创建新任务</button>
      <button id="schedTabRunningBtn" type="button" class="sched-tab" data-sched-tab="running">执行中任务</button>
      <button id="schedTabFinishedBtn" type="button" class="sched-tab" data-sched-tab="finished">执行结束任务</button>
    </div>
  </div>

  <div id="schedTabCreate" class="sched-tab-panel">
    <div class="card scheduled-create-card">
      <div class="scheduled-form-grid">
        <div class="scheduled-form-section">
          <h4 class="scheduled-section-title">基础设置</h4>

          <div class="modal-field">
            <label for="scheduledTaskTitle">任务名称 <span class="required-mark">*</span></label>
            <input id="scheduledTaskTitle" type="text" placeholder="例如：每天生成一条宣传视频文案">
          </div>

          <input id="scheduledTaskKind" type="hidden" value="capability">

          <div class="modal-field">
            <label for="scheduledTaskCapability">选择能力 <span class="required-mark">*</span></label>
            <select id="scheduledTaskCapability">
              <option value="goal.image.pipeline">文章 + 配图</option>
              <option value="goal.video.pipeline">创意成片</option>
              <option value="hifly.video.create_by_tts">必火数字人</option>
            </select>
            <p id="scheduledTaskCapabilityHint" class="scheduled-inline-hint"></p>
          </div>

          <div class="modal-field">
            <label for="scheduledTaskScheduleType">执行方式</label>
            <select id="scheduledTaskScheduleType">
              <option value="daily_times">每天固定时间</option>
              <option value="once">执行一次</option>
              <option value="interval">循环间隔</option>
            </select>
          </div>

          <div id="scheduledTaskStartAtBlock" class="modal-field">
            <label for="scheduledTaskStartAt">开始时间</label>
            <input id="scheduledTaskStartAt" type="datetime-local">
          </div>

          <div id="scheduledTaskIntervalBlock" class="modal-field" style="display:none;">
            <label for="scheduledTaskIntervalMinutes">间隔分钟</label>
            <input id="scheduledTaskIntervalMinutes" type="number" min="1" value="60">
          </div>

          <div id="scheduledTaskDailyTimesBlock" class="modal-field">
            <div class="scheduled-label-row">
              <label>每天执行时间</label>
              <button id="scheduledTaskAddDailyTimeBtn" type="button" class="btn btn-link btn-sm daily-time-add-btn" data-prefix="scheduledTask">添加时间点</button>
            </div>
            <div id="scheduledTaskDailyTimesList" class="scheduled-time-list"></div>
          </div>

          <div class="modal-field">
            <label for="scheduledTaskDevices">指定设备</label>
            <select id="scheduledTaskDevices" multiple size="4"></select>
          </div>
        </div>

        <div class="scheduled-param-panel">
          <div class="scheduled-section-title-row">
            <h4 class="scheduled-section-title">能力参数设置</h4>
            <button id="scheduledTaskAutoFillBtn" type="button" class="btn btn-ghost btn-sm" style="display:none;">自动选择</button>
          </div>

          <div id="scheduledTaskParamBlock" class="modal-field">
            <div id="scheduledTaskParamFields" class="scheduled-param-fields"></div>
          </div>

          <div id="scheduledTaskAssetUploadBlock" class="modal-field scheduled-asset-field" style="display:none;">
            <label for="scheduledTaskAssetUpload">附件素材</label>
            <input id="scheduledTaskAssetUpload" type="file" multiple>
          </div>

          <div id="scheduledTaskAssetIdsBlock" class="modal-field scheduled-asset-field" style="display:none;">
            <label for="scheduledTaskAssetIds">素材 ID</label>
            <textarea id="scheduledTaskAssetIds" rows="3" placeholder="多个素材 ID 可用逗号、空格或换行分隔"></textarea>
          </div>
        </div>
      </div>

      <footer class="scheduled-form-footer">
        <span id="scheduledTaskMsg" class="scheduled-task-msg"></span>
        <button id="scheduledTaskCreateBtn" type="button" class="btn btn-primary">确认下发任务</button>
      </footer>
    </div>

    <div class="card scheduled-list-card">
      <div class="scheduled-list-head">
        <h4>任务列表</h4>
      </div>
      <div id="scheduledTaskList"></div>
    </div>
  </div>

  <div id="schedTabRunning" class="sched-tab-panel" style="display:none;">
    <div class="card scheduled-list-card">
      <div class="scheduled-list-head">
        <h4>执行中任务</h4>
      </div>
      <div id="scheduledTaskRunningRunsList"></div>
    </div>
  </div>

  <div id="schedTabFinished" class="sched-tab-panel" style="display:none;">
    <div class="card scheduled-list-card">
      <div class="scheduled-list-head">
        <h4>执行结束任务</h4>
      </div>
      <div id="scheduledTaskFinishedRunsList"></div>
    </div>
  </div>
</div>
