<div id="content-personal-settings" class="content-block personal-settings-view">
  <style>
    .personal-settings-view {
      --ps-ink: #18233a;
      --ps-muted: #66758f;
      --ps-line: rgba(21, 35, 64, 0.12);
      --ps-soft: #f7faf8;
      --ps-accent: #0f8f7a;
      padding: 1rem;
      color: var(--ps-ink);
    }
    .ps-page { display: grid; gap: 0.9rem; }
    .ps-head {
      border-radius: 24px;
      padding: 1rem 1.1rem;
      background:
        radial-gradient(circle at 8% 0%, rgba(15,143,122,0.16), transparent 34%),
        linear-gradient(135deg, #fffaf0 0%, #eefaf6 58%, #f7fbff 100%);
      border: 1px solid var(--ps-line);
      box-shadow: 0 20px 50px rgba(20, 36, 64, 0.08);
      display: flex;
      justify-content: space-between;
      gap: 0.8rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .ps-title { margin: 0; font-size: clamp(1.45rem, 3vw, 2.05rem); line-height: 1.15; }
    .ps-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; padding: 0.45rem; border: 1px solid var(--ps-line); border-radius: 18px; background: rgba(255,255,255,0.86); }
    .ps-tab { border: 0; border-radius: 14px; padding: 0.62rem 0.9rem; background: transparent; color: var(--ps-muted); font-weight: 800; cursor: pointer; }
    .ps-tab.is-active { background: var(--ps-accent); color: #fff; box-shadow: 0 12px 26px rgba(15,143,122,0.22); }
    .ps-msg { display: none; border-radius: 14px; padding: 0.72rem 0.85rem; background: rgba(15,143,122,0.09); border: 1px solid rgba(15,143,122,0.18); color: #0b6d5e; font-weight: 700; }
    .ps-msg.err { background: #fff1f0; border-color: rgba(210, 63, 43, 0.24); color: #b42318; }
    .ps-panel { display: none; border-radius: 22px; background: rgba(255,255,255,0.94); border: 1px solid var(--ps-line); box-shadow: 0 18px 42px rgba(20, 36, 64, 0.06); padding: 1rem; }
    .ps-panel.is-active { display: block; }
    .ps-grid { display: grid; grid-template-columns: minmax(280px, 0.72fr) minmax(360px, 1.28fr); gap: 0.9rem; align-items: start; }
    .ps-grid.is-single { grid-template-columns: 1fr; }
    .ps-card { border: 1px solid var(--ps-line); border-radius: 18px; background: var(--ps-soft); padding: 0.9rem; display: grid; gap: 0.72rem; }
    .ps-card-title { font-weight: 900; font-size: 1rem; }
    .ps-field { display: grid; gap: 0.35rem; }
    .ps-field label { font-size: 0.83rem; font-weight: 800; color: #34425c; }
    .ps-field input,
    .ps-field textarea,
    .ps-field select { width: 100%; box-sizing: border-box; border: 1px solid rgba(21,35,64,0.16); border-radius: 14px; background: #fff; color: var(--ps-ink); padding: 0.68rem 0.75rem; outline: none; }
    .ps-field textarea { min-height: 96px; resize: vertical; line-height: 1.55; }
    .ps-field textarea.is-large { min-height: 250px; }
    .ps-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .ps-inline { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 0.6rem; align-items: end; }
    .ps-list { display: grid; gap: 0.55rem; }
    .ps-option { display: grid; grid-template-columns: auto minmax(0,1fr); gap: 0.55rem; align-items: start; border: 1px solid rgba(21,35,64,0.1); border-radius: 14px; background: #fff; padding: 0.62rem 0.7rem; }
    .ps-option strong { display: block; font-size: 0.9rem; }
    .ps-option small { display: block; color: var(--ps-muted); font-size: 0.76rem; margin-top: 0.15rem; word-break: break-all; }
    .ps-option.is-action { grid-template-columns: minmax(0,1fr) auto; align-items: center; }
    .ps-choice { display: grid; grid-template-columns: auto minmax(0,1fr); gap: 0.55rem; align-items: start; min-width: 0; }
    .ps-item-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: flex-end; }
    .ps-user-results { display: grid; gap: 0.5rem; }
    .ps-user-card { display: grid; grid-template-columns: 44px minmax(0,1fr) auto; gap: 0.62rem; align-items: center; border: 1px solid rgba(21,35,64,0.1); border-radius: 14px; background: #fff; padding: 0.62rem; }
    .ps-user-card img,
    .ps-user-avatar { width: 44px; height: 44px; border-radius: 999px; object-fit: cover; background: rgba(15,143,122,0.12); color: var(--ps-accent); display: grid; place-items: center; font-weight: 900; }
    .ps-empty { color: var(--ps-muted); font-size: 0.86rem; padding: 0.8rem; border: 1px dashed rgba(21,35,64,0.18); border-radius: 14px; background: rgba(255,255,255,0.72); }
    .ps-upload-zone { border: 1px dashed rgba(15,143,122,0.4); background: rgba(15,143,122,0.06); border-radius: 18px; padding: 0.85rem; display: grid; gap: 0.55rem; }
    .ps-file-list { display: grid; gap: 0.35rem; }
    .ps-file-chip { border: 1px solid rgba(21,35,64,0.1); border-radius: 12px; background: rgba(255,255,255,0.82); padding: 0.45rem 0.55rem; font-size: 0.78rem; color: var(--ps-muted); word-break: break-all; display: flex; gap: 0.55rem; align-items: center; }
    .ps-file-thumb { width: 52px; height: 52px; flex: 0 0 52px; border-radius: 10px; overflow: hidden; background: rgba(15,143,122,0.1); color: var(--ps-accent); display: grid; place-items: center; font-size: 0.66rem; font-weight: 900; }
    .ps-file-thumb img, .ps-file-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ps-file-meta { min-width: 0; flex: 1; }
    .ps-file-meta span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ps-file-chip button { border: 0; background: transparent; color: #b42318; font-weight: 800; cursor: pointer; white-space: nowrap; }
    .ps-source-grid { display: grid; gap: 0.5rem; }
    .ps-source-card { display: grid; gap: 0.45rem; border: 1px solid rgba(21,35,64,0.1); border-radius: 14px; background: rgba(255,255,255,0.78); padding: 0.65rem; }
    .ps-source-card > span,
    .ps-source-profile span { font-size: 0.83rem; font-weight: 900; color: #34425c; }
    .ps-source-profile { grid-template-columns: auto minmax(0,1fr); align-items: center; }
    .ps-source-list { display: grid; gap: 0.35rem; }
    .ps-source-option { display: grid; grid-template-columns: auto minmax(0,1fr); gap: 0.5rem; align-items: start; color: var(--ps-muted); font-size: 0.78rem; }
    .ps-source-option strong { display: block; color: var(--ps-ink); font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ps-source-option small { display: block; margin-top: 0.12rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ps-source-option input,
    .ps-source-profile input { width: auto; margin-top: 0.12rem; }
    .ps-doc-type-list { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 0.5rem; }
    .ps-doc-type-list .ps-option { height: 100%; }
    .ps-generated-list { display: grid; gap: 0.72rem; }
    .ps-generated-doc { border: 1px solid rgba(21,35,64,0.12); border-radius: 18px; background: #fff; padding: 0.75rem; display: grid; gap: 0.58rem; }
    .ps-generated-head { display: flex; justify-content: space-between; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
    .ps-generated-head strong { font-size: 0.95rem; }
    .ps-generated-doc textarea { width: 100%; box-sizing: border-box; min-height: 220px; resize: vertical; border: 1px solid rgba(21,35,64,0.14); border-radius: 14px; padding: 0.72rem; line-height: 1.55; color: var(--ps-ink); background: #fbfcff; }
    .ps-memory-item { border: 1px solid rgba(21,35,64,0.1); background: #fff; border-radius: 18px; padding: 0.78rem; display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 0.75rem; align-items: start; }
    .ps-memory-item strong { display: block; }
    .ps-memory-item small { display: block; color: var(--ps-muted); margin-top: 0.24rem; word-break: break-all; }
    .ps-memory-preview { white-space: pre-wrap; max-height: 420px; overflow: auto; border-radius: 16px; padding: 0.8rem; background: #101827; color: #eef7f3; font-size: 0.84rem; line-height: 1.55; }
    .ps-survey { display: grid; gap: 0.8rem; }
    .ps-survey-top { display: grid; grid-template-columns: auto minmax(0,1fr); gap: 0.7rem; align-items: center; color: var(--ps-muted); font-weight: 900; }
    .ps-survey-bar { height: 8px; border-radius: 999px; background: rgba(15,143,122,0.13); overflow: hidden; }
    .ps-survey-bar i { display: block; height: 100%; width: 0; background: linear-gradient(135deg, #0f8f7a, #18a9c8); border-radius: inherit; transition: width 0.2s ease; }
    .ps-survey-card { border: 1px solid rgba(21,35,64,0.1); border-radius: 18px; background: #fff; padding: 1rem; display: grid; gap: 0.65rem; }
    .ps-survey-card strong { font-size: 1.12rem; }
    .ps-survey-answer input,
    .ps-survey-answer textarea { width: 100%; box-sizing: border-box; border: 1px solid rgba(21,35,64,0.16); border-radius: 16px; padding: 0.82rem; font-size: 1rem; line-height: 1.55; }
    .ps-survey-answer textarea { min-height: 160px; resize: vertical; }
    .ps-hidden-fields { display: none; }
    .ps-template-card { border: 1px solid rgba(21,35,64,0.1); border-radius: 16px; background: #fff; padding: 0.72rem; display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 0.65rem; align-items: start; }
    .ps-template-card strong { display: block; }
    .ps-template-meta { color: var(--ps-muted); font-size: 0.78rem; margin-top: 0.18rem; }
    @media (max-width: 960px) {
      .ps-grid,
      .ps-inline,
      .ps-doc-type-list { grid-template-columns: 1fr; }
      .personal-settings-view { padding: 0.75rem; }
      .ps-template-card,
      .ps-memory-item,
      .ps-option.is-action { grid-template-columns: 1fr; }
      .ps-item-actions { justify-content: flex-start; }
    }
  </style>

  <div class="ps-page">
    <header class="ps-head">
      <h3 class="ps-title">IP人设定位</h3>
      <div class="ps-actions">
        <button type="button" id="psRefreshBtn" class="btn btn-ghost btn-sm">刷新</button>
        <button type="button" id="psBackBtn" class="btn btn-ghost btn-sm">返回</button>
      </div>
    </header>

    <nav class="ps-tabs" aria-label="IP人设定位">
      <button type="button" class="ps-tab is-active" data-ps-tab="keywords">关键词</button>
      <button type="button" class="ps-tab" data-ps-tab="competitors">同行账号</button>
      <button type="button" class="ps-tab" data-ps-tab="profile">资料调查</button>
      <button type="button" class="ps-tab" data-ps-tab="upload">上传资料</button>
      <button type="button" class="ps-tab" data-ps-tab="memory">记忆文件</button>
      <button type="button" class="ps-tab" data-ps-tab="template">模板</button>
    </nav>

    <div id="psMsg" class="ps-msg"></div>

    <section class="ps-panel is-active" data-ps-panel="keywords">
      <div class="ps-grid is-single">
        <section class="ps-card">
          <div class="ps-card-title">关键词</div>
          <div class="ps-inline">
            <div class="ps-field">
              <label for="psKeywordInput">行业关键词</label>
              <input id="psKeywordInput" placeholder="输入行业关键词">
            </div>
            <div class="ps-field">
              <label for="psKeywordDisplayName">显示名</label>
              <input id="psKeywordDisplayName" placeholder="可空">
            </div>
          </div>
          <div class="ps-actions">
            <button type="button" id="psAddKeywordBtn" class="btn btn-primary btn-sm">添加关键词</button>
          </div>
          <div id="psKeywordList" class="ps-list"></div>
        </section>
      </div>
    </section>

    <section class="ps-panel" data-ps-panel="competitors">
      <div class="ps-grid is-single">
        <section class="ps-card">
          <div class="ps-card-title">同行账号</div>
          <div class="ps-inline">
            <div class="ps-field">
              <label for="psCompetitorPlatform">平台</label>
              <select id="psCompetitorPlatform">
                <option value="douyin">抖音</option>
                <option value="wechat_channels">视频号</option>
              </select>
            </div>
            <div class="ps-field">
              <label for="psCompetitorSearchInput">昵称或抖音号</label>
              <input id="psCompetitorSearchInput" placeholder="输入昵称或抖音号">
            </div>
          </div>
          <div class="ps-inline">
            <div class="ps-field">
              <label for="psCompetitorTags">行业标签</label>
              <input id="psCompetitorTags" placeholder="可空">
            </div>
            <div class="ps-field">
              <label>&nbsp;</label>
              <button type="button" id="psSearchCompetitorBtn" class="btn btn-primary btn-sm">搜索账号</button>
            </div>
          </div>
          <div id="psCompetitorSearchResults" class="ps-user-results"></div>
          <div id="psCompetitorList" class="ps-list"></div>
        </section>
      </div>
    </section>

    <section class="ps-panel" data-ps-panel="profile">
      <section class="ps-card ps-survey">
        <div class="ps-survey-top">
          <span id="psProfileStepText">1/11</span>
          <div class="ps-survey-bar"><i id="psProfileProgress"></i></div>
        </div>
        <div class="ps-survey-card">
          <strong id="psProfileQuestionTitle">名字</strong>
          <div id="psProfileAnswerHost" class="ps-survey-answer"></div>
        </div>
        <div class="ps-actions">
          <button class="btn btn-ghost btn-sm" type="button" id="psProfilePrevBtn">上一步</button>
          <button class="btn btn-primary btn-sm" type="button" id="psProfileNextBtn">下一步</button>
          <button class="btn btn-primary btn-sm" type="button" id="psSaveProfileBtn">保存资料调查</button>
        </div>
        <div class="ps-hidden-fields" aria-hidden="true">
          <input id="psProfileName" type="hidden">
          <input id="psBirthEra" type="hidden">
          <input id="psCurrentCity" type="hidden">
          <input id="psHometown" type="hidden">
          <input id="psRole" type="hidden">
          <input id="psShareTopic" type="hidden">
          <input id="psVideoStyle" type="hidden">
          <input id="psAfterViewAction" type="hidden">
          <textarea id="psBusinessProduct"></textarea>
          <textarea id="psTargetCustomer"></textarea>
          <textarea id="psAdvantages"></textarea>
        </div>
      </section>
    </section>

    <section class="ps-panel" data-ps-panel="upload">
      <div class="ps-grid">
        <section class="ps-card">
          <div class="ps-card-title">上传资料</div>
          <div class="ps-upload-zone">
            <div class="ps-field">
              <label for="psMemoryFiles">上传文件</label>
              <input id="psMemoryFiles" type="file" multiple accept=".txt,.md,.csv,.json,.yaml,.yml,.html,.pdf,.doc,.docx,.xls,.xlsx,.xlsm,.pptx,.jpg,.jpeg,.png,.webp,.gif,.mp4,.mov,.m4v,.avi,.mkv,.webm,.mp3,.wav,.m4a,.aac,.ogg,.flac,.amr,.wma,audio/*">
            </div>
            <div id="psSelectedFiles" class="ps-file-list"></div>
          </div>
          <div class="ps-actions">
            <button type="button" id="psSaveRawMemoryBtn" class="btn btn-ghost btn-sm">存入资料</button>
          </div>
        </section>
      </div>
    </section>

    <section class="ps-panel" data-ps-panel="memory">
      <div class="ps-grid">
        <section class="ps-card">
          <div class="ps-card-title">生成记忆文件</div>
          <div class="ps-source-grid">
            <label class="ps-source-card ps-source-profile">
              <input id="psMemoryUseProfile" type="checkbox" checked>
              <span>资料调查</span>
            </label>
            <div class="ps-source-card">
              <span>关键词</span>
              <div id="psMemoryKeywordSourceList" class="ps-source-list"></div>
            </div>
            <div class="ps-source-card">
              <span>同行账号</span>
              <div id="psMemoryCompetitorSourceList" class="ps-source-list"></div>
            </div>
            <div class="ps-source-card">
              <span>上传资料</span>
              <div id="psMemoryUploadSourceList" class="ps-source-list"></div>
            </div>
          </div>
          <div class="ps-field">
            <label>AI 生成类型</label>
            <div id="psGenerateDocTypes" class="ps-doc-type-list">
              <label class="ps-option">
                <input type="checkbox" data-ps-doc-type value="brand_product_intro" checked>
                <span><strong>产品介绍</strong></span>
              </label>
              <label class="ps-option">
                <input type="checkbox" data-ps-doc-type value="product_service_faq" checked>
                <span><strong>百问百答</strong></span>
              </label>
              <label class="ps-option">
                <input type="checkbox" data-ps-doc-type value="short_video_scripts" checked>
                <span><strong>短视频口播稿</strong></span>
              </label>
            </div>
          </div>
          <div class="ps-field">
            <label for="psCustomReferenceFile">自定义参考文档</label>
            <input id="psCustomReferenceFile" type="file" accept=".txt,.md,.csv,.json,.yaml,.yml,.html,.pdf,.doc,.docx,.xls,.xlsx,.xlsm,.pptx">
            <div id="psCustomReferenceFileInfo" class="ps-file-list"></div>
          </div>
          <div class="ps-actions">
            <button type="button" id="psGenerateMemoryBtn" class="btn btn-primary btn-sm">生成记忆文件</button>
          </div>
          <div class="ps-card-title">审核后存入记忆</div>
          <div id="psGeneratedDocList" class="ps-generated-list">
            <div class="ps-empty">生成后在这里预览。</div>
          </div>
          <textarea id="psMemoryReviewText" class="is-large" style="display:none;" aria-hidden="true"></textarea>
          <div class="ps-inline">
            <div class="ps-field">
              <label for="psSaveMode">存入文档</label>
              <select id="psSaveMode">
                <option value="new">新建文档</option>
                <option value="overwrite">覆盖已有文档</option>
              </select>
            </div>
            <div class="ps-field">
              <label for="psTargetMemorySelect">选择已有文档</label>
              <select id="psTargetMemorySelect">
                <option value="">请选择已有文档</option>
              </select>
            </div>
          </div>
          <div class="ps-field">
            <label for="psMemoryTitle">新文档名字</label>
            <input id="psMemoryTitle" placeholder="输入文档名字" autocomplete="off" spellcheck="false">
          </div>
          <div class="ps-actions">
            <button type="button" id="psSaveMemoryBtn" class="btn btn-primary btn-sm">存入记忆</button>
          </div>
        </section>
        <section class="ps-card">
          <div class="ps-card-title">记忆文件</div>
          <div id="psMemoryList" class="ps-list"></div>
          <div class="ps-card-title">内容预览</div>
          <div id="psMemoryPreview" class="ps-memory-preview">点击“预览”查看内容。</div>
        </section>
      </div>
    </section>

    <section class="ps-panel" data-ps-panel="template">
      <div class="ps-grid">
        <section class="ps-card">
          <div class="ps-card-title">当前使用模板</div>
          <div id="psCurrentTemplateBox" class="ps-list"></div>
          <div class="ps-card-title">新建模板</div>
          <div class="ps-field">
            <label for="psTemplateName">模板名称</label>
            <input id="psTemplateName" placeholder="模板名称">
          </div>
          <div class="ps-actions">
            <button type="button" id="psSaveTemplateBtn" class="btn btn-primary btn-sm">保存模板</button>
            <button type="button" id="psNewTemplateBtn" class="btn btn-ghost btn-sm">新建模板</button>
          </div>
          <div class="ps-card-title">已有模板</div>
          <div id="psSavedTemplateList" class="ps-list"></div>
        </section>
        <section class="ps-card">
          <div class="ps-card-title">选择关键词</div>
          <div id="psTemplateKeywordList" class="ps-list"></div>
          <div class="ps-card-title">选择同行账号</div>
          <div id="psTemplateCompetitorList" class="ps-list"></div>
          <div class="ps-card-title">选择记忆文件</div>
          <div id="psTemplateMemoryList" class="ps-list"></div>
        </section>
      </div>
    </section>
  </div>
</div>
