<div id="content-viral-tvc-studio" class="content-block">
  <div class="viral-tvc-page">
    <style>
      .viral-tvc-page {
        --tvc-accent: #2563eb;
        --tvc-accent-2: #7c3aed;
        --tvc-ink: #0f172a;
        --tvc-muted: #64748b;
        --tvc-border: rgba(15, 23, 42, 0.12);
        --tvc-panel: #ffffff;
        min-height: calc(100vh - 72px);
        padding: 1rem;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 32%),
          radial-gradient(circle at top right, rgba(124, 58, 237, 0.12), transparent 30%),
          #f6f8fb;
        color: var(--tvc-ink);
      }
      .viral-tvc-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 0.9rem;
      }
      .viral-tvc-kicker {
        color: var(--tvc-accent);
        font-size: 0.78rem;
        font-weight: 800;
      }
      .viral-tvc-title {
        margin: 0.12rem 0 0;
        font-size: 1.42rem;
        line-height: 1.2;
      }
      .viral-tvc-subtitle {
        margin: 0.34rem 0 0;
        color: var(--tvc-muted);
        font-size: 0.92rem;
        line-height: 1.55;
        max-width: 760px;
      }
      .viral-tvc-head-actions {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        flex-wrap: wrap;
      }
      .viral-tvc-msg {
        display: none;
        margin-bottom: 0.85rem;
        padding: 0.72rem 0.82rem;
        border-radius: 8px;
        border: 1px solid rgba(37, 99, 235, 0.22);
        background: rgba(37, 99, 235, 0.08);
        color: #1d4ed8;
        white-space: pre-line;
      }
      .viral-tvc-msg.err {
        border-color: rgba(225, 29, 72, 0.22);
        background: rgba(225, 29, 72, 0.08);
        color: #be123c;
      }
      .viral-tvc-layout {
        display: grid;
        grid-template-columns: minmax(320px, 0.95fr) minmax(360px, 1.05fr);
        gap: 0.9rem;
        align-items: start;
      }
      .viral-tvc-panel {
        background: var(--tvc-panel);
        border: 1px solid var(--tvc-border);
        border-radius: 8px;
        padding: 0.95rem;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.05);
      }
      .viral-tvc-panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        margin-bottom: 0.7rem;
        font-size: 1rem;
        font-weight: 900;
      }
      .viral-tvc-panel-hint {
        margin: -0.15rem 0 0.8rem;
        color: var(--tvc-muted);
        font-size: 0.84rem;
        line-height: 1.5;
      }
      .viral-tvc-field {
        display: grid;
        gap: 0.36rem;
        margin-bottom: 0.75rem;
      }
      .viral-tvc-field label {
        color: #334155;
        font-size: 0.8rem;
        font-weight: 800;
      }
      .viral-tvc-field input,
      .viral-tvc-field textarea,
      .viral-tvc-field select {
        width: 100%;
        border: 1px solid rgba(15, 23, 42, 0.14);
        border-radius: 7px;
        padding: 0.62rem 0.72rem;
        background: #fff;
        color: var(--tvc-ink);
        font-size: 0.92rem;
        outline: none;
      }
      .viral-tvc-field textarea {
        min-height: 128px;
        resize: vertical;
        line-height: 1.6;
      }
      .viral-tvc-inline {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.72rem;
      }
      .viral-tvc-main-btn {
        width: 100%;
        min-height: 42px;
        font-size: 0.95rem;
        font-weight: 800;
      }
      .viral-tvc-secondary-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.72rem;
      }
      .viral-tvc-cues {
        display: grid;
        gap: 0.5rem;
        margin-top: 0.85rem;
      }
      .viral-tvc-cue {
        border-radius: 8px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: linear-gradient(180deg, rgba(248, 250, 252, 0.96), rgba(255, 255, 255, 0.98));
        padding: 0.7rem 0.78rem;
      }
      .viral-tvc-cue strong {
        display: block;
        font-size: 0.86rem;
        margin-bottom: 0.22rem;
      }
      .viral-tvc-cue span {
        color: var(--tvc-muted);
        font-size: 0.8rem;
        line-height: 1.5;
      }
      .viral-tvc-status-hero {
        border-radius: 8px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        min-height: 208px;
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.94), rgba(124, 58, 237, 0.94));
        padding: 1rem;
        color: #fff;
      }
      .viral-tvc-status-kicker {
        font-size: 0.78rem;
        font-weight: 800;
        opacity: 0.86;
      }
      .viral-tvc-status-title {
        margin: 0.4rem 0 0;
        font-size: 1.38rem;
        line-height: 1.24;
        max-width: 90%;
      }
      .viral-tvc-status-copy {
        margin: 0.48rem 0 0;
        max-width: 84%;
        font-size: 0.9rem;
        line-height: 1.6;
        opacity: 0.94;
      }
      .viral-tvc-job-box {
        margin-top: 0.9rem;
        border-radius: 8px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: #fff;
        padding: 0.8rem;
      }
      .viral-tvc-job-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        margin-bottom: 0.6rem;
      }
      .viral-tvc-job-id {
        color: var(--tvc-muted);
        font-size: 0.8rem;
      }
      .viral-tvc-pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 0.62rem;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.1);
        color: #1d4ed8;
        font-size: 0.78rem;
        font-weight: 800;
      }
      .viral-tvc-pill.is-success {
        background: rgba(16, 185, 129, 0.12);
        color: #047857;
      }
      .viral-tvc-pill.is-failed {
        background: rgba(225, 29, 72, 0.12);
        color: #be123c;
      }
      .viral-tvc-meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.55rem;
        margin-top: 0.75rem;
      }
      .viral-tvc-meta-card {
        border-radius: 8px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: rgba(248, 250, 252, 0.78);
        padding: 0.72rem;
      }
      .viral-tvc-meta-card strong {
        display: block;
        font-size: 0.98rem;
      }
      .viral-tvc-meta-card span {
        display: block;
        margin-top: 0.18rem;
        color: var(--tvc-muted);
        font-size: 0.78rem;
      }
      .viral-tvc-record-list {
        display: grid;
        gap: 0.55rem;
        margin-top: 0.9rem;
      }
      .viral-tvc-record {
        border-radius: 8px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: #fff;
        padding: 0.72rem 0.78rem;
      }
      .viral-tvc-record strong {
        display: block;
        line-height: 1.5;
      }
      .viral-tvc-record small {
        display: block;
        margin-top: 0.26rem;
        color: var(--tvc-muted);
        line-height: 1.5;
      }
      .viral-tvc-empty {
        min-height: 420px;
        border: 1px dashed rgba(15, 23, 42, 0.12);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--tvc-muted);
        background: rgba(248, 250, 252, 0.78);
        text-align: center;
        padding: 1.2rem;
        line-height: 1.7;
      }
      @media (max-width: 1100px) {
        .viral-tvc-layout { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        .viral-tvc-page { padding: 0.8rem; }
        .viral-tvc-head { flex-direction: column; }
        .viral-tvc-head-actions { width: 100%; }
        .viral-tvc-head-actions .btn { flex: 1 1 0; }
        .viral-tvc-inline,
        .viral-tvc-meta { grid-template-columns: 1fr; }
      }
    </style>
    <header class="viral-tvc-head">
      <div>
        <div class="viral-tvc-kicker">视频生成工作台</div>
        <h3 class="viral-tvc-title">爆款 TVC 专属页面</h3>
        <p class="viral-tvc-subtitle">首页点“爆款TVC”后直接进入这里。先快速填一句视频目标，先出任务，再决定要不要继续进完整分镜工作台细调。</p>
      </div>
      <div class="viral-tvc-head-actions">
        <button type="button" id="viralTvcBackBtn" class="btn btn-ghost btn-sm">返回首页</button>
        <button type="button" id="viralTvcRefreshBtn" class="btn btn-ghost btn-sm">刷新状态</button>
      </div>
    </header>
    <div id="viralTvcMsg" class="viral-tvc-msg"></div>
    <div class="viral-tvc-layout">
      <section class="viral-tvc-panel">
        <div class="viral-tvc-panel-title">快速生成</div>
        <p class="viral-tvc-panel-hint">适合先快速起一条视频任务。后面如果要补参考图、重做分镜、看完整进度，可以继续进入完整工作台。</p>
        <div class="viral-tvc-field">
          <label for="viralTvcPrompt">视频需求</label>
          <textarea id="viralTvcPrompt" placeholder="例如：做一个医美抗衰爆款短视频，主角是 30 岁左右女性，镜头高级、有产品感，适合抖音投流。"></textarea>
        </div>
        <div class="viral-tvc-inline">
          <div class="viral-tvc-field">
            <label for="viralTvcRatio">画幅</label>
            <select id="viralTvcRatio">
              <option value="9:16" selected>9:16 竖屏</option>
              <option value="1:1">1:1 方屏</option>
              <option value="16:9">16:9 横屏</option>
            </select>
          </div>
          <div class="viral-tvc-field">
            <label for="viralTvcDuration">时长</label>
            <select id="viralTvcDuration">
              <option value="10">10 秒</option>
              <option value="20">20 秒</option>
              <option value="30">30 秒</option>
              <option value="40">40 秒</option>
              <option value="50">50 秒</option>
              <option value="60" selected>60 秒</option>
            </select>
          </div>
        </div>
        <div class="viral-tvc-inline">
          <div class="viral-tvc-field">
            <label for="viralTvcTone">风格节奏</label>
            <select id="viralTvcTone">
              <option value="premium" selected>高级质感</option>
              <option value="dramatic">戏剧张力</option>
              <option value="clean">干净产品感</option>
              <option value="emotional">情绪化叙事</option>
            </select>
          </div>
          <div class="viral-tvc-field">
            <label for="viralTvcModel">模型</label>
            <select id="viralTvcModel">
              <option value="grok-imagine-video-1.5-preview" selected>影梦1.5pro</option>
              <option value="veo3.1">影梦plus</option>
            </select>
          </div>
        </div>
        <div class="viral-tvc-inline">
          <div class="viral-tvc-field">
            <label for="viralTvcAudio">配音</label>
            <select id="viralTvcAudio">
              <option value="true" selected>自动生成音频</option>
              <option value="false">只生成画面</option>
            </select>
          </div>
          <div class="viral-tvc-field">
            <label for="viralTvcSaveMode">结果处理</label>
            <select id="viralTvcSaveMode">
              <option value="merge" selected>自动合成成片并入库</option>
              <option value="segments">仅保留分段结果</option>
            </select>
          </div>
        </div>
        <button type="button" id="viralTvcGenerateBtn" class="btn btn-primary viral-tvc-main-btn">提交爆款 TVC 任务</button>
        <div class="viral-tvc-secondary-actions">
          <button type="button" id="viralTvcOpenFullBtn" class="btn btn-ghost btn-sm">进入完整分镜工作台</button>
        </div>
        <div class="viral-tvc-cues">
          <div class="viral-tvc-cue">
            <strong>这里适合做什么</strong>
            <span>先快速发起一条视频，验证方向对不对，再决定要不要继续细调分镜、参考图和节奏。</span>
          </div>
          <div class="viral-tvc-cue">
            <strong>你可以这样写</strong>
            <span>“做一个 20 秒医美抗衰投流视频，偏高级广告片感，适合 30+ 女性。”</span>
          </div>
        </div>
      </section>
      <section class="viral-tvc-panel">
        <div class="viral-tvc-panel-title">任务状态</div>
        <div id="viralTvcStatusHost" class="viral-tvc-empty">还没有提交任务。<br>左侧填好需求后，点一下就能直接发起爆款 TVC 任务。</div>
      </section>
    </div>
  </div>
</div>
