<style>
  #content-agent.agent-studio-page {
    height: calc(100dvh - 82px);
    min-height: 620px;
    padding: 0.7rem;
    box-sizing: border-box;
    overflow: hidden;
    border-radius: 24px;
    isolation: isolate;
    clip-path: inset(0 round 24px);
    background:
      radial-gradient(circle at 16% 18%, rgba(56, 189, 248, 0.14), transparent 24%),
      radial-gradient(circle at 78% 16%, rgba(59, 130, 246, 0.12), transparent 22%),
      linear-gradient(180deg, #030813 0%, #07111f 56%, #091321 100%);
  }
  #content-agent .agent-studio-shell {
    display: grid;
    grid-template-columns: minmax(0, 1.34fr) minmax(420px, 0.66fr);
    gap: 0;
    width: 100%;
    height: 100%;
    min-height: 0;
    border-radius: 24px;
    overflow: hidden;
    isolation: isolate;
    clip-path: inset(0 round 24px);
    background: #050814;
    border: 1px solid rgba(148, 163, 184, 0.1);
    box-shadow: 0 30px 80px rgba(2, 6, 23, 0.42);
  }
  #content-agent .agent-studio-visual {
    position: relative;
    min-height: 0;
    overflow: hidden;
    border-top-left-radius: 24px;
    border-bottom-left-radius: 24px;
    background: #040916;
    isolation: isolate;
  }
  #content-agent .agent-studio-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.04);
    filter: saturate(1.08) brightness(0.74) contrast(1.02);
  }
  #content-agent .agent-studio-video-mask {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(4, 9, 22, 0.14) 0%, rgba(4, 9, 22, 0.06) 36%, rgba(4, 9, 22, 0.18) 100%),
      linear-gradient(180deg, rgba(3, 8, 19, 0.08) 0%, rgba(3, 8, 19, 0.2) 62%, rgba(3, 8, 19, 0.54) 100%),
      radial-gradient(circle at 24% 46%, rgba(56, 189, 248, 0.2), transparent 20%),
      radial-gradient(circle at 52% 52%, rgba(37, 99, 235, 0.16), transparent 28%);
    z-index: 1;
    pointer-events: none;
  }
  #content-agent .agent-studio-visual-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(148, 163, 184, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.45) 36%, rgba(0,0,0,0.95) 100%);
    opacity: 0.35;
    z-index: 2;
    pointer-events: none;
  }
  #content-agent .agent-studio-visual-glow {
    position: absolute;
    border-radius: 999px;
    filter: blur(30px);
    opacity: 0.85;
    pointer-events: none;
    z-index: 2;
  }
  #content-agent .agent-studio-visual-glow.glow-a {
    left: 6%;
    bottom: 10%;
    width: min(24vw, 320px);
    height: min(24vw, 320px);
    background: radial-gradient(circle, rgba(59, 130, 246, 0.42) 0%, rgba(59, 130, 246, 0) 74%);
  }
  #content-agent .agent-studio-visual-glow.glow-b {
    right: 12%;
    top: 14%;
    width: min(18vw, 240px);
    height: min(18vw, 240px);
    background: radial-gradient(circle, rgba(34, 211, 238, 0.2) 0%, rgba(34, 211, 238, 0) 72%);
  }
  #content-agent .agent-studio-copy {
    position: absolute;
    left: clamp(28px, 4vw, 60px);
    bottom: clamp(28px, 5vw, 64px);
    z-index: 3;
    display: grid;
    gap: 0.72rem;
    max-width: min(420px, 42%);
  }
  #content-agent .agent-studio-badge {
    display: inline-flex;
    width: fit-content;
    align-items: center;
    gap: 0.45rem;
    padding: 0.34rem 0.9rem;
    border-radius: 999px;
    background: rgba(14, 116, 144, 0.18);
    border: 1px solid rgba(125, 211, 252, 0.26);
    color: #7dd3fc;
    font-size: 0.8rem;
    font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  #content-agent .agent-studio-copy h2 {
    margin: 0;
    color: #f8fafc;
    font-size: clamp(2.05rem, 3.8vw, 3.45rem);
    line-height: 1.04;
    letter-spacing: 0;
    text-shadow: 0 10px 26px rgba(2, 6, 23, 0.42);
    max-width: 8ch;
  }
  #content-agent .agent-studio-copy p {
    margin: 0;
    color: rgba(226, 232, 240, 0.82);
    font-size: 0.96rem;
    line-height: 1.64;
    max-width: 30ch;
  }
  #content-agent .agent-studio-panel {
    min-height: 0;
    background: #0b1120;
    border-left: 1px solid rgba(255,255,255,0.05);
    border-top-right-radius: 24px;
    border-bottom-right-radius: 24px;
    overflow: hidden;
  }
  #content-agent .agent-studio-panel-inner {
    height: 100%;
    overflow-y: auto;
    padding: 1.45rem 1.15rem 1.4rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.92rem;
    border-top-right-radius: 24px;
    border-bottom-right-radius: 24px;
    background:
      linear-gradient(180deg, rgba(11, 17, 32, 0.98) 0%, rgba(9, 14, 27, 0.98) 100%);
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #content-agent .agent-studio-panel-inner::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
  }
  #content-agent .agent-studio-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 0.1rem;
  }
  #content-agent .agent-studio-header-main {
    min-width: 0;
  }
  #content-agent .agent-studio-header-title {
    color: #f8fafc;
    font-size: 1.42rem;
    line-height: 1.1;
    font-weight: 800;
    margin-bottom: 0.2rem;
  }
  #content-agent .agent-studio-header-subtitle {
    color: #60a5fa;
    font-size: 0.82rem;
    font-weight: 700;
  }
  #content-agent .agent-studio-card {
    background: #111827;
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 12px;
    padding: 1rem;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }
  #content-agent .agent-studio-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.7rem;
    margin-bottom: 0.82rem;
    color: #94a3b8;
    font-size: 0.84rem;
    font-weight: 600;
  }
  #content-agent .agent-studio-card-tag {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 0.14rem 0.55rem;
    border-radius: 999px;
    background: rgba(37, 99, 235, 0.15);
    border: 1px solid rgba(59, 130, 246, 0.26);
    color: #60a5fa;
    font-size: 0.74rem;
    font-weight: 700;
  }
  #content-agent .agent-studio-card-tag.success {
    background: rgba(16, 185, 129, 0.12);
    border-color: rgba(16, 185, 129, 0.22);
    color: #34d399;
  }
  #content-agent .agent-studio-task-row {
    display: grid;
    grid-template-columns: 36px minmax(0, 1fr);
    gap: 0.85rem;
    align-items: start;
  }
  #content-agent .agent-studio-task-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, rgba(147, 197, 253, 0.95), rgba(59, 130, 246, 0.72) 48%, rgba(37, 99, 235, 0.24) 100%);
    box-shadow: 0 0 18px rgba(59, 130, 246, 0.24);
    position: relative;
    margin-top: 0.1rem;
  }
  #content-agent .agent-studio-task-icon::after {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.88);
    opacity: 0.85;
  }
  #content-agent .agent-studio-task-text {
    color: #f8fafc;
    font-size: 0.94rem;
    line-height: 1.62;
    word-break: break-word;
  }
  #content-agent .agent-studio-result-list {
    display: grid;
    gap: 0.72rem;
  }
  #content-agent .agent-result-media-card {
    margin: 0;
    padding: 0.95rem;
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(2, 6, 23, 0.82), rgba(6, 11, 25, 0.94));
    border: 1px solid rgba(96, 165, 250, 0.14);
    display: grid;
    gap: 0.68rem;
  }
  #content-agent .agent-result-media-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
  }
  #content-agent .agent-result-media-head span {
    color: #60a5fa;
    font-size: 0.78rem;
    font-weight: 700;
  }
  #content-agent .agent-result-media-meta {
    color: #64748b;
    font-size: 0.74rem;
    line-height: 1.4;
    text-align: right;
  }
  #content-agent .agent-result-media-button {
    position: relative;
    display: block;
    width: 100%;
    padding: 0;
    border: 0;
    border-radius: 12px;
    overflow: hidden;
    background: #020617;
    cursor: pointer;
    aspect-ratio: 16 / 10;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }
  #content-agent .agent-result-media-button img,
  #content-agent .agent-result-media-button video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    background: #020617;
  }
  #content-agent .agent-result-media-button::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(2, 6, 23, 0.02), rgba(2, 6, 23, 0.3));
    pointer-events: none;
  }
  #content-agent .agent-result-media-button:hover .agent-result-media-action,
  #content-agent .agent-result-media-button:focus-visible .agent-result-media-action {
    transform: translateY(0);
    opacity: 1;
  }
  #content-agent .agent-result-media-action {
    position: absolute;
    right: 12px;
    bottom: 12px;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.42rem 0.78rem;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.82);
    border: 1px solid rgba(148, 163, 184, 0.18);
    color: #f8fafc;
    font-size: 0.74rem;
    font-weight: 700;
    transform: translateY(6px);
    opacity: 0.92;
    transition: transform 180ms ease, opacity 180ms ease;
    pointer-events: none;
    z-index: 1;
  }
  #content-agent .agent-result-media-action::before {
    content: "";
    width: 0.48rem;
    height: 0.48rem;
    border-radius: 999px;
    background: #38bdf8;
    box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
  }
  #content-agent .agent-result-media-note {
    color: #cbd5e1;
    font-size: 0.82rem;
    line-height: 1.58;
    word-break: break-word;
  }
  #content-agent .agent-studio-result-list .agent-result-row {
    margin: 0;
    padding: 0.85rem 0.9rem;
    border-radius: 10px;
    background: rgba(3, 8, 19, 0.44);
    border: 1px solid rgba(255,255,255,0.04);
    display: grid;
    gap: 0.24rem;
  }
  #content-agent .agent-studio-result-list .agent-result-row span {
    color: #60a5fa;
    font-size: 0.76rem;
    font-weight: 700;
  }
  #content-agent .agent-studio-result-list .agent-result-row strong {
    color: #e2e8f0;
    font-size: 0.84rem;
    line-height: 1.58;
    font-weight: 600;
    word-break: break-word;
  }
  #content-agent .agent-studio-timeline {
    position: relative;
    display: grid;
    gap: 0.92rem;
  }
  #content-agent .agent-studio-timeline::before {
    content: "";
    position: absolute;
    left: 15px;
    top: 18px;
    bottom: 18px;
    width: 1px;
    background: rgba(255,255,255,0.08);
  }
  #content-agent .agent-event-item {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 32px minmax(0, 1fr);
    gap: 0.84rem;
    padding: 0;
    border: 0;
    background: transparent;
  }
  #content-agent .agent-event-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    margin-top: 0;
    background: #1e293b;
    border: 4px solid #111827;
    box-shadow: none;
    position: relative;
  }
  #content-agent .agent-event-dot::after {
    content: "";
    position: absolute;
    inset: 9px;
    border-radius: 50%;
    background: #60a5fa;
    box-shadow: 0 0 10px rgba(96, 165, 250, 0.25);
  }
  #content-agent .agent-event-body {
    min-width: 0;
    margin-top: 0.15rem;
    display: grid;
    gap: 0.22rem;
  }
  #content-agent .agent-event-topline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.65rem;
  }
  #content-agent .agent-event-topline strong {
    color: #f8fafc;
    font-size: 0.88rem;
    line-height: 1.3;
    font-weight: 700;
  }
  #content-agent .agent-event-topline span,
  #content-agent .agent-event-status {
    color: #64748b;
    font-size: 0.74rem;
    font-weight: 500;
  }
  #content-agent .agent-event-item p {
    margin: 0;
    color: #94a3b8;
    font-size: 0.8rem;
    line-height: 1.58;
    word-break: break-word;
  }
  #content-agent .agent-empty-state-small {
    margin: 0;
    padding: 0.85rem 0.9rem;
    border-radius: 10px;
    background: rgba(3, 8, 19, 0.44);
    color: #64748b;
    font-size: 0.8rem;
    line-height: 1.55;
  }
  #content-agent .agent-media-lightbox[hidden] {
    display: none !important;
  }
  #content-agent .agent-media-lightbox {
    position: fixed;
    inset: 0;
    z-index: 2600;
    display: grid;
    place-items: center;
    padding: 1.25rem;
    background: rgba(2, 6, 23, 0.82);
    backdrop-filter: blur(8px);
  }
  #content-agent .agent-media-lightbox-panel {
    position: relative;
    width: min(1100px, calc(100vw - 32px));
    max-height: calc(100vh - 32px);
    padding: 1rem;
    border-radius: 16px;
    background: #020817;
    border: 1px solid rgba(148, 163, 184, 0.14);
    box-shadow: 0 28px 90px rgba(2, 6, 23, 0.56);
    display: grid;
    gap: 0.9rem;
  }
  #content-agent .agent-media-lightbox-close {
    position: absolute;
    top: 0.8rem;
    right: 0.8rem;
    width: 38px;
    height: 38px;
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.18);
    background: rgba(15, 23, 42, 0.84);
    color: #f8fafc;
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
  }
  #content-agent .agent-media-lightbox-title {
    color: #e2e8f0;
    font-size: 0.92rem;
    font-weight: 700;
    padding-right: 3rem;
  }
  #content-agent .agent-media-lightbox-stage {
    min-height: min(72vh, 720px);
    display: grid;
    place-items: center;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
  }
  #content-agent .agent-media-lightbox-stage img,
  #content-agent .agent-media-lightbox-stage video {
    max-width: 100%;
    max-height: min(72vh, 720px);
    display: block;
    object-fit: contain;
    background: #000;
  }
  @media (max-width: 1180px) {
    #content-agent.agent-studio-page {
      height: auto;
      min-height: 0;
      overflow: visible;
    }
    #content-agent .agent-studio-shell {
      grid-template-columns: 1fr;
      height: auto;
    }
    #content-agent .agent-studio-visual {
      min-height: 460px;
    }
    #content-agent .agent-studio-panel {
      min-height: 0;
    }
  }
  @media (max-width: 760px) {
    #content-agent.agent-studio-page {
      padding: 0.5rem;
    }
    #content-agent .agent-studio-visual {
      min-height: 360px;
    }
    #content-agent .agent-studio-copy {
      left: 20px;
      right: 20px;
      bottom: 24px;
      max-width: none;
    }
    #content-agent .agent-studio-copy h2 {
      font-size: 1.7rem;
      max-width: 10ch;
    }
    #content-agent .agent-studio-copy p {
      font-size: 0.88rem;
    }
    #content-agent .agent-studio-panel-inner {
      padding: 1rem 0.9rem 1.1rem;
    }
    }
  </style>

<div id="content-agent" class="content-block agent-studio-page">
  <section class="agent-studio-shell">
    <div class="agent-studio-visual">
      <video
        class="agent-studio-video"
        src="/static/generated/agent/agent-visual.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
      ></video>
      <div class="agent-studio-video-mask" aria-hidden="true"></div>
      <div class="agent-studio-visual-glow glow-a" aria-hidden="true"></div>
      <div class="agent-studio-visual-glow glow-b" aria-hidden="true"></div>
      <div class="agent-studio-visual-grid" aria-hidden="true"></div>

    </div>

    <aside class="agent-studio-panel">
      <div class="agent-studio-panel-inner">
        <div class="agent-studio-header">
          <div class="agent-studio-header-main">
            <div class="agent-studio-header-title">执行任务</div>
            <div class="agent-studio-header-subtitle">任务状态流</div>
          </div>
          <button type="button" id="agentRefreshBtn" class="btn btn-ghost btn-sm">刷新</button>
        </div>

        <section class="agent-studio-card">
          <div class="agent-studio-card-head">
            <span>接收到的任务</span>
            <span class="agent-studio-card-tag">实时</span>
          </div>
          <div class="agent-studio-task-row">
            <div class="agent-studio-task-icon"></div>
            <div class="agent-studio-task-content">
              <div id="agentVoicePrompt" class="agent-studio-task-text">等待新的手机语音任务...</div>
            </div>
          </div>
        </section>

        <section class="agent-studio-card" id="agentResultCard" hidden>
          <div class="agent-studio-card-head">
            <span>任务结果</span>
            <span class="agent-studio-card-tag success">已完成</span>
          </div>
          <div id="agentResultBody" class="agent-studio-result-list"></div>
        </section>

        <section class="agent-studio-card">
          <div class="agent-studio-card-head">
            <span>执行时间线</span>
          </div>
          <div id="agentEventList" class="agent-studio-timeline">
            <div class="agent-empty-state-small">正在等待执行事件...</div>
          </div>
        </section>

      </div>
    </aside>
  </section>
  <div id="agentMediaLightbox" class="agent-media-lightbox" hidden>
    <div class="agent-media-lightbox-panel">
      <button type="button" id="agentMediaLightboxClose" class="agent-media-lightbox-close" aria-label="关闭预览">×</button>
      <div id="agentMediaLightboxTitle" class="agent-media-lightbox-title">媒体预览</div>
      <div id="agentMediaLightboxStage" class="agent-media-lightbox-stage"></div>
    </div>
  </div>
</div>
