            <section id="${id}" class="section" data-keywords="${[title, ...tags].join(" ")}">

        const search = document.getElementById("guide-search");
        const sections = [...document.querySelectorAll(".section")];
        const links = [...document.querySelectorAll("#guide-nav a")];
        search.addEventListener("input", () => {
            const query = search.value.trim().toLowerCase();
            sections.forEach((section) => {
                const text = `${section.textContent} ${section.dataset.keywords || ""}`.toLowerCase();
                section.classList.toggle("hidden", query && !text.includes(query));
            });
        });
        const observer = new IntersectionObserver((entries) => {
            const visible = entries.filter((entry) => entry.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
            if (!visible) return;
            links.forEach((link) => link.classList.toggle("active", link.getAttribute("href") === `#${visible.target.id}`));
        }, { rootMargin: "-20% 0px -65% 0px", threshold: [0.1, 0.3, 0.6] });
        sections.forEach((section) => observer.observe(section));
