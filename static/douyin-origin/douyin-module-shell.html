        function normalize(value) {
            return String(value ?? "").trim();
        }

        function toggleSidebarGroup(groupKey, forceOpen = null) {
            const group = document.querySelector(`.sidebar-group[data-group="${groupKey}"]`);
            if (!group || group.dataset.collapsible !== "true") return;
            const shouldOpen = typeof forceOpen === "boolean" ? forceOpen : !group.classList.contains("is-open");
            document.querySelectorAll('.sidebar-group[data-collapsible="true"]').forEach(item => {
                const open = shouldOpen && item === group;
                item.classList.toggle("is-open", open);
                const header = item.querySelector(".sidebar-group-header");
                if (header) header.setAttribute("aria-expanded", open ? "true" : "false");
            });
        }

        function syncSidebarNavigationState(target = "overview") {
            document.querySelectorAll(".sidebar-group").forEach(el => el.classList.remove("is-active"));
            document.querySelectorAll(".sidebar-group-header,.sidebar-subbtn").forEach(el => el.classList.remove("active"));
            const trigger = document.querySelector(`.sidebar-group-header[data-sidebar="${target}"], .sidebar-subbtn[data-sidebar="${target}"]`);
            trigger?.classList.add("active");
            const group = trigger?.closest(".sidebar-group");
            if (group) {
                group.classList.add("is-active");
                const header = group.querySelector(".sidebar-group-header");
                if (header && header !== trigger && group.dataset.collapsible === "true") {
                    header.classList.add("active");
                    toggleSidebarGroup(group.getAttribute("data-group") || "", true);
                }
            }
        }

        function getCurrentRouteKey() {
            const params = new URLSearchParams(window.location.search || "");
            const requested = normalize(params.get("target") || "");
            if (requested && douyinRouteConfig[requested]) return requested;
            const path = normalize(window.location.pathname || "").replace(/\/+$/, "");
            if (path.startsWith("/douyin/")) return path.slice("/douyin/".length);
            const fileName = path.split("/").pop() || "";
            const staticRouteMap = {
                "douyin-collect.html": "collect",
                "douyin-follow.html": "follow",
                "douyin-stranger-leads.html": "stranger-leads",
                "douyin-mention.html": "mention",
                "douyin-module-shell.html": "search",
            };
            return staticRouteMap[fileName] || "";
        }

        function applyModuleRoute() {
            const routeKey = getCurrentRouteKey();
            const config = douyinRouteConfig[routeKey] || douyinRouteConfig.search;
            document.title = `必火AI获客 · 抖音${config.title}`;
            const frameUrl = `/static/douyin-origin/douyin.html?target=${encodeURIComponent(config.target)}&embed=1`;
            document.getElementById("module-route-title").textContent = config.title;
            document.getElementById("module-route-copy").textContent = config.copy;
            document.getElementById("module-route-workbench-link").href = `/static/douyin-origin/douyin.html?target=${encodeURIComponent(config.target)}`;
            document.getElementById("module-route-frame").src = frameUrl;
            document.getElementById("module-route-meta").innerHTML = config.chips
                .map(item => `<span class="module-route-chip">${item}</span>`)
                .join("");
            syncSidebarNavigationState(config.target);
        }

        document.addEventListener("DOMContentLoaded", applyModuleRoute);
    </script>
</body>
