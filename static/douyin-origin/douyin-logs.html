    <script>
        let lastDouyinLogId = 0;
        let logPollTimer = 0;
        let logPollInFlight = false;

        function esc(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function addLog(message, level = "info") {
            const box = document.getElementById("log-content");
            if (!box) return;
            const time = new Date().toLocaleTimeString("zh-CN", { hour12: false });
            const entry = document.createElement("div");
            entry.className = "log-entry";
            entry.innerHTML = `<span class="log-time">${time}</span><span class="log-level-${esc(level)}">${esc(message)}</span>`;
            box.appendChild(entry);
            while (box.children.length > 400) box.removeChild(box.firstChild);
            box.scrollTop = box.scrollHeight;
        }

        function clearLogs() {
            const box = document.getElementById("log-content");
            if (!box) return;
            box.innerHTML = "";
            addLog("日志已清空。");
        }

        function toggleSidebarGroup(id) {
            const panel = document.getElementById(id);
            if (!panel) return;
            panel.parentElement?.classList.toggle("is-open");
        }

        async function pollDouyinLogs() {
            const response = await fetch(`/api/douyin/logs?since_id=${lastDouyinLogId}`);
            const data = await response.json();
            if (data.code !== 200) throw new Error(data.msg || data.detail || "刷新日志失败。");
            const logs = Array.isArray(data.logs) ? data.logs : [];
            logs.forEach((item) => addLog(item.message || "", item.level || "info"));
            const ids = logs.map((item) => Number(item.id || 0));
            lastDouyinLogId = Math.max(Number(data.latest_id || 0), ...(ids.length ? ids : [0]));
        }

        async function pollLogsOnce(silent = true) {
            if (logPollInFlight) return;
            logPollInFlight = true;
            try {
                await pollDouyinLogs();
            } catch (error) {
                if (!silent) addLog(`刷新日志失败：${error.message}`, "error");
            } finally {
                logPollInFlight = false;
            }
        }

        function scheduleLogPolling(immediate = false) {
            if (logPollTimer) {
                window.clearTimeout(logPollTimer);
                logPollTimer = 0;
            }
            const delay = immediate ? 0 : (document.hidden ? 30000 : 5000);
            logPollTimer = window.setTimeout(async () => {
                await pollLogsOnce(true);
                scheduleLogPolling(false);
            }, delay);
        }

        document.addEventListener("visibilitychange", () => {
            scheduleLogPolling(true);
        });

        document.addEventListener("DOMContentLoaded", async () => {
            await pollLogsOnce(true);
            scheduleLogPolling(false);
        });
    </script>
